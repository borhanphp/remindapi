name: Deploy API to Production

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # Fails fast on syntax errors before anything reaches the server
      - name: Syntax check
        run: |
          node --check server.js
          for f in controllers/*.js routes/*.js models/*.js middleware/*.js services/*.js utils/*.js config/*.js; do
            node --check "$f"
          done

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            # DEPLOY_PATH must be set as a repository secret, e.g. /var/www/zeeremind-api
            cd "${{ secrets.DEPLOY_PATH }}"

            git pull origin main

            # Production dependencies only, from the lockfile
            npm ci --omit=dev

            # Zero-downtime reload; falls back to a fresh start on first deploy
            pm2 reload zeeremind-api --update-env || pm2 start server.js --name "zeeremind-api"
